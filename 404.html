<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Átirányítás...</title>
  <script>
    // GitHub Pages SPA fallback
    // Preserves the path so the SPA router can handle it
    var path = window.location.pathname;
    var query = window.location.search;
    var hash = window.location.hash;
    // Redirect to index.html with the original path stored in sessionStorage
    sessionStorage.setItem('spa-redirect', path + query + hash);
    window.location.replace('/');
  </script>
</head>
<body>
  <p>Átirányítás...</p>
</body>
</html>
